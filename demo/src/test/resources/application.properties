# 测试数据源配置（使用 H2 内存数据库）
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=username
spring.datasource.password=

spring.datasource.dynamic.primary=engine
spring.datasource.dynamic.datasource.engine.driver-class-name=org.h2.Driver
spring.datasource.dynamic.datasource.engine.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.dynamic.datasource.engine.username=username
spring.datasource.dynamic.datasource.engine.password=
mybatis.configuration.map-underscore-to-camel-case=true
# DDL初始化
spring.sql.init.schema-locations=classpath:script/turbo-mysql-h2-ddl.sql

# DML初始化
spring.sql.init.data-locations=classpath:script/turbo-mysql-h2-dml.sql
spring.main.allow-circular-references=true
logging.config=classpath:logback-spring.xml
